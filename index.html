const p2 = (v) => parseFloat(v.toFixed(2));

// ─── Stats ────────────────────────────────────────────────────────────────
// Returns stats split: turno (h) and foraTurno (hF), plus combined
function calcStats(pessoa, noites, turnoAtual) {
  const pref = pessoa.preferencia;

  // ── Turno historico (manual) ──────────────────────────────────────────
  const h = pessoa.historico||{};
  let nPt=h.nPrimeiras||0, nSt=h.nSegundas||0;
  let pBt=h.primBom||0, pMt=h.primMau||0, sBt=h.segBom||0, sMt=h.segMau||0;
  let contrTurno = pref==="primeiras"?(h.nSegundas||0): pref==="segundas"?(h.nPrimeiras||0):0;
  let totalPrefTurno = pref&&pref!=="indiferente" ? (h.nPrimeiras||0)+(h.nSegundas||0) : 0;

  // ── Fora turno historico (manual) ─────────────────────────────────────
  const hF = pessoa.historicoFora||{};
  let nPf=hF.nPrimeiras||0, nSf=hF.nSegundas||0;
  let pBf=hF.primBom||0, pMf=hF.primMau||0, sBf=hF.segBom||0, sMf=hF.segMau||0;
  let contrFora = pref==="primeiras"?(hF.nSegundas||0): pref==="segundas"?(hF.nPrimeiras||0):0;
  let totalPrefFora = pref&&pref!=="indiferente" ? (hF.nPrimeiras||0)+(hF.nSegundas||0) : 0;

  // ── From registered noites ────────────────────────────────────────────
  noites.forEach((n) => {
    const pa=n.primeiras?.find((a)=>a.pessoaId===pessoa.id);
    const sa=n.segundas?.find((a)=>a.pessoaId===pessoa.id);
    const atrib=pa||sa;
    if(!atrib) return;
    const wasTurno=atrib.eraTurno===true;

    if(pa){
      if(wasTurno){ nPt++; if(pa.beneficio==="bom") pBt++; if(pa.beneficio==="mau") pMt++; }
      else         { nPf++; if(pa.beneficio==="bom") pBf++; if(pa.beneficio==="mau") pMf++; }
    }
    if(sa){
      if(wasTurno){ nSt++; if(sa.beneficio==="bom") sBt++; if(sa.beneficio==="mau") sMt++; }
      else         { nSf++; if(sa.beneficio==="bom") sBf++; if(sa.beneficio==="mau") sMf++; }
    }

    if(pref&&pref!=="indiferente"){
      const contr=pref==="primeiras"?"segundas":"primeiras";
      const naContr=n[contr]?.find((a)=>a.pessoaId===pessoa.id);
      const naPref =n[pref]?.find((a)=>a.pessoaId===pessoa.id);
      if(naContr||naPref){
        if(wasTurno){ totalPrefTurno++; if(naContr&&!naContr.porEscolha) contrTurno++; }
        else         { totalPrefFora++;  if(naContr&&!naContr.porEscolha) contrFora++;  }
      }
    }
  });

  // pct benefícios: benefício / noites nessa parte (not vs each other)
  const pctB=(ben,noitesParte)=>noitesParte===0?0:p2((ben/noitesParte)*100);

  return {
    turno:{
      nPrimeiras:nPt, nSegundas:nSt,
      primBom:pBt, primMau:pMt, segBom:sBt, segMau:sMt,
      pctPrimBom:pctB(pBt,nPt), pctPrimMau:pctB(pMt,nPt),
      pctSegBom:pctB(sBt,nSt),  pctSegMau:pctB(sMt,nSt),
      pctContraria:totalPrefTurno===0?0:p2((contrTurno/totalPrefTurno)*100),
      contrariaCount:contrTurno, totalPref:totalPrefTurno,
    },
    fora:{
      nPrimeiras:nPf, nSegundas:nSf,
      primBom:pBf, primMau:pMf, segBom:sBf, segMau:sMf,
      pctPrimBom:pctB(pBf,nPf), pctPrimMau:pctB(pMf,nPf),
      pctSegBom:pctB(sBf,nSf),  pctSegMau:pctB(sMf,nSf),
      pctContraria:totalPrefFora===0?0:p2((contrFora/totalPrefFora)*100),
      contrariaCount:contrFora, totalPref:totalPrefFora,
    },
  };
}

// ─── Alerta duas noites seguidas com benefício ────────────────────────────
function alertasDuasNoites(pessoaId, noites) {
  if(noites.length<2) return false;
  const sorted=[...noites].sort((a,b)=>new Date(a.data)-new Date(b.data));
  for(let i=sorted.length-1;i>=1;i--){
    const temB=(n)=>{
      const p=n.primeiras?.find((a)=>a.pessoaId===pessoaId);
      const s=n.segundas?.find((a)=>a.pessoaId===pessoaId);
      return (p&&p.beneficio!=="nenhum")||(s&&s.beneficio!=="nenhum");
    };
    if(temB(sorted[i-1])&&temB(sorted[i])) return true;
  }
  return false;
}

async function parseNomesCSV(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const nomes=[];
      e.target.result.split(/\r?\n/).forEach((line)=>{
        line.split(",").forEach((n)=>{ const t=n.trim(); if(t&&t.length>1) nomes.push(t); });
      });
      res(nomes);
    };
    reader.onerror=rej; reader.readAsText(file);
  });
}

// ─── Autocomplete ─────────────────────────────────────────────────────────
function Autocomplete({value,onChange,options,onSelect,placeholder,disabled}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const h=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=value.length>0?options.filter((s)=>s.toLowerCase().includes(value.toLowerCase())):options.slice(0,8);
  return (
    <div ref={ref} style={{position:"relative",flex:1}}>
      <input value={value} onChange={(e)=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)} placeholder={placeholder} disabled={disabled}
        style={{...INP,opacity:disabled?0.5:1}}/>
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a3e",border:"1px solid #5b21b6",borderRadius:"0 0 8px 8px",zIndex:200,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px #0008"}}>
          {filtered.map((s)=>(
            <div key={s} onClick={()=>{onSelect(s);setOpen(false);onChange("");}}
              style={{padding:"9px 13px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #2a2a4a"}}
              onMouseEnter={(e)=>e.currentTarget.style.background="#2a2a5a"}
              onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Modal Perfil ─────────────────────────────────────────────────────────
function ModalPerfil({pessoa,noites,turno,onSave,onClose}){
  const [nome,setNome]=useState(pessoa.nome);
  const [pref,setPref]=useState(pessoa.preferencia||"indiferente");
  const h0=pessoa.historico||{};
  const hF0=pessoa.historicoFora||{};
  const [h,setH]=useState({nPrimeiras:h0.nPrimeiras||0,nSegundas:h0.nSegundas||0,primBom:h0.primBom||0,primMau:h0.primMau||0,segBom:h0.segBom||0,segMau:h0.segMau||0});
  const [hF,setHF]=useState({nPrimeiras:hF0.nPrimeiras||0,nSegundas:hF0.nSegundas||0,primBom:hF0.primBom||0,primMau:hF0.primMau||0,segBom:hF0.segBom||0,segMau:hF0.segMau||0});
  const sf=(setFn)=>(k)=>(e)=>setFn((p)=>({...p,[k]:parseInt(e.target.value)||0}));
  const stats=calcStats({...pessoa,preferencia:pref,historico:h,historicoFora:hF},noites,turno);

  const HistBlock=({title,s,pref2})=>(

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,color:"#a8c8a8"}}>

        <span>Segundas: <strong>{s.nSegundas}</strong></span>
        <span>P.Bom: <strong>{s.primBom}</strong> ({s.pctPrimBom}%)</span>
        <span>P.Mau: <strong>{s.primMau}</strong> ({s.pctPrimMau}%)</span>
        <span>S.Bom: <strong>{s.segBom}</strong> ({s.pctSegBom}%)</span>
        <span>S.Mau: <strong>{s.segMau}</strong> ({s.pctSegMau}%)</span>
        {pref2!=="indiferente"&&<span style={{gridColumn:"1/-1",color:"#ffaa44"}}>
          Contrária: <strong>{s.contrariaCount}/{s.totalPref}</strong> ({s.pctContraria}%)
        </span>}

  const HistForm=({title,vals,setFn})=>(
    <div style={{background:"#0d0d22",border:"1px solid #2a2a4a",borderRadius:8,padding:14,marginBottom:12}}>
      <div style={{fontSize:11,color:"#a78bfa",letterSpacing:1,marginBottom:10,fontWeight:700}}>{title}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

          <div key={k}><label style={LBL}>{l}</label>
            <input type="number" min={0} value={vals[k]} onChange={setFn(k)} style={INP}/>

  return (
    <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}
      onClick={(e)=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#12122a",border:"1px solid #5b21b6",borderRadius:14,padding:28,width:"min(560px,96vw)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{fontWeight:900,fontSize:16,color:"#a78bfa",marginBottom:20,letterSpacing:2}}>👤 PERFIL — {pessoa.nome}</div>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {[["primeiras","🌑 Primeiras"],["segundas","🌒 Segundas"],["indiferente","↔ Indiferente"]].map(([v,l])=>(
            <button key={v} onClick={()=>setPref(v)}
              style={{...BTN(pref===v?"#5b21b6":"#2a2a4a"),flex:1,border:`1px solid ${pref===v?"#a78bfa":"#3d3d7a"}`}}>{l}</button>

        <HistForm title="📋 HISTÓRICO MANUAL — COMO MEMBRO DO TURNO" vals={h} setFn={sf(setH)}/>
        <HistForm title="📋 HISTÓRICO MANUAL — FORA DO TURNO" vals={hF} setFn={sf(setHF)}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>

// ─── Modal Nova Noite ─────────────────────────────────────────────────────
function ModalNoite({state,onClose,onGravar}){
  const [data,setData]=useState(new Date().toISOString().slice(0,10));
  const [pool,setPool]=useState([]);
  const [search,setSearch]=useState("");
  const [step,setStep]=useState(1);
  const [primeiras,setPrimeiras]=useState([]);
  const [segundas,setSegundas]=useState([]);
  const [sugP,setSugP]=useState({bomList:[],mauList:[]});
  const [sugS,setSugS]=useState({bomList:[],mauList:[]});

  const pById=(id)=>state.pessoas.find((p)=>p.id===id);

  const getStatsFor=(p)=>{
    const s=calcStats(p,state.noites,state.turno);
    const useFora=!state.turno.includes(p.id)&&((p.historicoFora?.nPrimeiras||0)+(p.historicoFora?.nSegundas||0)>0);
    return useFora?s.fora:s.turno;
  };

  const computeSug=(pessoas,fieldBom,fieldMau)=>{
    if(!pessoas.length) return {bomList:[],mauList:[]};
    const doT=pessoas.filter((p)=>state.turno.includes(p.id));
    const foraT=pessoas.filter((p)=>!state.turno.includes(p.id));
    console.log("computeSug — turno ids:", state.turno);
    console.log("computeSug — pessoas ids:", pessoas.map(p=>p.id+":"+p.nome));
    console.log("computeSug — doT:", doT.map(p=>p.nome));
    console.log("computeSug — foraT:", foraT.map(p=>p.nome));
    const candidates=doT.length>0?doT:foraT;
    // Full ordered list: turno first (for display), fora after (marked F)
    const allOrdered=[...doT,...foraT];
    const bomList=[...candidates].sort((a,b)=>getStatsFor(a)[fieldBom]-getStatsFor(b)[fieldBom])
      .map((p)=>({nome:p.nome,val:getStatsFor(p)[fieldBom],isTurno:true}));
    const mauList=[...candidates].sort((a,b)=>getStatsFor(a)[fieldMau]-getStatsFor(b)[fieldMau])
      .map((p)=>({nome:p.nome,val:getStatsFor(p)[fieldMau],isTurno:true}));
    // Append fora do turno at the end (greyed out, not primary suggestions)
    if(doT.length>0){
      const foraB=[...foraT].sort((a,b)=>getStatsFor(a)[fieldBom]-getStatsFor(b)[fieldBom])
        .map((p)=>({nome:p.nome,val:getStatsFor(p)[fieldBom],isTurno:false}));
      const foraM=[...foraT].sort((a,b)=>getStatsFor(a)[fieldMau]-getStatsFor(b)[fieldMau])
        .map((p)=>({nome:p.nome,val:getStatsFor(p)[fieldMau],isTurno:false}));
      bomList.push(...foraB);
      mauList.push(...foraM);
    }
    return {bomList,mauList};
  };

  const availSearch=state.pessoas.filter((p)=>!pool.includes(p.id))
    .sort((a,b)=>{
      const ta=state.turno.includes(a.id)?0:1,tb=state.turno.includes(b.id)?0:1;
      return ta-tb||a.nome.localeCompare(b.nome);
    });

  const addToPool=(nome)=>{
    if(pool.length>=8) return;
    const clean=nome.replace(/^★ /,"");
    const p=state.pessoas.find((pp)=>pp.nome===clean);
    if(p&&!pool.includes(p.id)) setPool((prev)=>[...prev,p.id]);
    setSearch("");
  };

  const avancar=()=>{
    const pessoasPool=pool.map((id)=>pById(id)).filter(Boolean);

    const getPct=(p)=>getStatsFor(p).pctContraria;

    const doTurno =pessoasPool.filter((p)=>state.turno.includes(p.id));
    const foraTurno=pessoasPool.filter((p)=>!state.turno.includes(p.id));

    const primIds=[], segIds=[];

    // ── Distribute TURNO members first ──────────────────────────────────
    const tPrefP=doTurno.filter((p)=>p.preferencia==="primeiras");
    const tPrefS=doTurno.filter((p)=>p.preferencia==="segundas");
    const tInd  =doTurno.filter((p)=>!p.preferencia||p.preferencia==="indiferente");

    // prefP turno → primeiras; overflow → segundas (sorted by pctContraria DESC)
    if(tPrefP.length<=4){
      tPrefP.forEach((p)=>primIds.push(p.id));
    } else {
      [...tPrefP].sort((a,b)=>getPct(b)-getPct(a))
        .forEach((p,i)=>{ if(i<4) primIds.push(p.id); else segIds.push(p.id); });
    }

    // prefS turno → segundas; overflow → primeiras
    const slotsS1=4-segIds.length;
    if(tPrefS.length<=slotsS1){
      tPrefS.forEach((p)=>segIds.push(p.id));
    } else {
      [...tPrefS].sort((a,b)=>getPct(b)-getPct(a))
        .forEach((p,i)=>{ if(i<slotsS1) segIds.push(p.id); else primIds.push(p.id); });
    }

    // indiferentes turno → balance by nPrimeiras
    [...tInd].sort((a,b)=>getStatsFor(a).nPrimeiras-getStatsFor(b).nPrimeiras)
      .forEach((p)=>{
        if(primIds.length<4) primIds.push(p.id);
        else if(segIds.length<4) segIds.push(p.id);
      });

    // ── Fill remaining slots with FORA DO TURNO ──────────────────────────
    // Fora do turno goes to whichever slots remain — no preference priority
    // Sort: those who have been sent to contrária least (pctContraria ASC) go first
    // but they fill whatever slots are open regardless of preference
    const remP=4-primIds.length;
    const remS=4-segIds.length;

    const fPrefP=foraTurno.filter((p)=>p.preferencia==="primeiras");
    const fPrefS=foraTurno.filter((p)=>p.preferencia==="segundas");
    const fInd  =foraTurno.filter((p)=>!p.preferencia||p.preferencia==="indiferente");

    // Assign fora do turno to remaining slots — preferred side first if slots available,
    // otherwise to whatever is open
    [...fPrefP].sort((a,b)=>getPct(b)-getPct(a)).forEach((p)=>{
      if(primIds.length<4) primIds.push(p.id);
      else if(segIds.length<4) segIds.push(p.id);
    });
    [...fPrefS].sort((a,b)=>getPct(b)-getPct(a)).forEach((p)=>{
      if(segIds.length<4) segIds.push(p.id);
      else if(primIds.length<4) primIds.push(p.id);
    });
    [...fInd].sort((a,b)=>getStatsFor(a).nPrimeiras-getStatsFor(b).nPrimeiras).forEach((p)=>{
      if(primIds.length<4) primIds.push(p.id);
      else if(segIds.length<4) segIds.push(p.id);
    });

    const toA=(ids)=>ids.map((id)=>({pessoaId:id,beneficio:"nenhum",porEscolha:false,eraTurno:state.turno.includes(id)}));
    setPrimeiras(toA(primIds));
    setSegundas(toA(segIds));

    const pP=primIds.map((id)=>pessoasPool.find((p)=>p.id===id)).filter(Boolean);
    const sP=segIds.map((id)=>pessoasPool.find((p)=>p.id===id)).filter(Boolean);
    setSugP(computeSug(pP,"pctPrimBom","pctPrimMau"));
    setSugS(computeSug(sP,"pctSegBom","pctSegMau"));
    setStep(2);
  };

  const temBeneficio=(pid)=>{
    const ip=primeiras.find((a)=>a.pessoaId===pid);
    const is=segundas.find((a)=>a.pessoaId===pid);
    return (ip&&ip.beneficio!=="nenhum")||(is&&is.beneficio!=="nenhum");
  };

  const moverParte=(pid,de)=>{
    if(de==="primeiras"){
      const a=primeiras.find((x)=>x.pessoaId===pid);
      setPrimeiras((prev)=>prev.filter((x)=>x.pessoaId!==pid));
      setSegundas((prev)=>[...prev,{...a,beneficio:"nenhum",porEscolha:false}]);
    } else {
      const a=segundas.find((x)=>x.pessoaId===pid);
      setSegundas((prev)=>prev.filter((x)=>x.pessoaId!==pid));
      setPrimeiras((prev)=>[...prev,{...a,beneficio:"nenhum",porEscolha:false}]);
    }
  };

  const setBen=(pid,b,setL)=>setL((prev)=>prev.map((a)=>a.pessoaId===pid?{...a,beneficio:b}:a));
  const setEC=(pid,v,setL)=>setL((prev)=>prev.map((a)=>a.pessoaId===pid?{...a,porEscolha:v}:a));

  const canGravar=primeiras.length===4&&segundas.length===4;

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}
      onClick={(e)=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#0f0f24",border:"1px solid #3d3d7a",borderRadius:16,padding:28,width:"min(720px,98vw)",maxHeight:"95vh",overflowY:"auto"}}>
        <div style={{fontWeight:900,fontSize:17,color:"#a78bfa",marginBottom:4,letterSpacing:2}}>🌙 REGISTAR NOITE</div>
        <div style={{fontSize:11,color:"#6b6b9a",marginBottom:16}}>{step===1?"PASSO 1 — Adicionar quem faz a noite":"PASSO 2 — Distribuir e atribuir benefícios"}</div>
        <label style={LBL}>DATA</label>
        <input type="date" value={data} onChange={(e)=>setData(e.target.value)} style={{...INP,marginBottom:18,maxWidth:200}}/>

        {step===1&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <Autocomplete value={search} onChange={setSearch}
                options={availSearch.map((p)=>(state.turno.includes(p.id)?"★ ":"")+p.nome)}
                onSelect={addToPool}
                placeholder={pool.length>=8?"Máximo 8 pessoas":"Pesquisar e adicionar pessoa..."}
                disabled={pool.length>=8}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={LBL}>PESSOAS DESTA NOITE</span>
              <span style={{fontSize:12,fontWeight:700,color:pool.length===8?"#4ade80":"#f59e0b"}}>{pool.length}/8</span>
            </div>
            {pool.length===0&&<div style={{color:"#4b5563",fontSize:13,textAlign:"center",padding:"24px 0",border:"1px dashed #2a2a4a",borderRadius:8,marginBottom:16}}>Ainda não foram adicionadas pessoas</div>}
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
              {pool.map((id)=>{
                const p=pById(id); if(!p) return null;
                const isTurno=state.turno.includes(p.id);
                return (
                  <div key={id} style={{display:"flex",alignItems:"center",gap:8,background:"#141428",border:`1px solid ${isTurno?"#4a3a7a":"#2a2a4a"}`,borderRadius:8,padding:"9px 13px"}}>
                    {isTurno&&<span style={{fontSize:9,background:"#3d2d7a",color:"#c4b5fd",borderRadius:3,padding:"1px 5px",fontWeight:700}}>TURNO</span>}
                    <span style={{color:pc(p),fontSize:13}}>{pi(p)}</span>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{p.nome}</span>
                    <button onClick={()=>setPool((prev)=>prev.filter((pid)=>pid!==id))} style={{background:"transparent",color:"#f87171",border:"none",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={BTN("#2a2a4a")}>Cancelar</button>
              <button onClick={avancar} disabled={pool.length!==8}
                style={{...BTN(),opacity:pool.length===8?1:0.4,cursor:pool.length===8?"pointer":"not-allowed"}}>Continuar →</button>
            </div>
          </div>
        )}

        {step===2&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              {[
                {label:"🌑 PRIMEIRAS",lista:primeiras,setL:setPrimeiras,sug:sugP,parteStr:"primeiras"},
                {label:"🌒 SEGUNDAS", lista:segundas, setL:setSegundas, sug:sugS,parteStr:"segundas"},
              ].map(({label,lista,setL,sug,parteStr})=>(
                <div key={label} style={{background:"#12122a",borderRadius:10,padding:14,border:"1px solid #2a2a4a"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{fontWeight:900,fontSize:13,color:"#a78bfa",letterSpacing:1}}>{label}</span>
                    <span style={{fontSize:12,fontWeight:700,color:lista.length===4?"#4ade80":"#f59e0b"}}>{lista.length}/4</span>
                  </div>
                  {(sug.bomList.length>0||sug.mauList.length>0)&&(
                    <div style={{background:"#0d1a0d",border:"1px solid #1d4a1d",borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:11}}>
                      <div style={{color:"#4ade80",fontWeight:700,marginBottom:4}}>💡 Ordem sugerida:</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        <div>
                          <div style={{color:"#4ade80",marginBottom:3,fontWeight:700}}>Bom</div>
                          {sug.bomList.map((item,i)=>(
                            <div key={item.nome} style={{color:i===0?"#4ade80":item.isTurno?"#3a6a3a":"#5a5a3a",marginBottom:1,display:"flex",gap:4,alignItems:"center"}}>
                              <span>{i+1}. {item.nome}</span>
                              {!item.isTurno&&<span style={{fontSize:9,color:"#888",background:"#2a2a2a",borderRadius:2,padding:"0 3px"}}>F</span>}
                              <span style={{color:"#2a4a2a"}}>({item.val}%)</span>
                            </div>
                          ))}
                        </div>
                        <div>
                          <div style={{color:"#f87171",marginBottom:3,fontWeight:700}}>Mau</div>
                          {sug.mauList.map((item,i)=>(
                            <div key={item.nome} style={{color:i===0?"#f87171":item.isTurno?"#6a3a3a":"#5a5a3a",marginBottom:1,display:"flex",gap:4,alignItems:"center"}}>
                              <span>{i+1}. {item.nome}</span>
                              {!item.isTurno&&<span style={{fontSize:9,color:"#888",background:"#2a2a2a",borderRadius:2,padding:"0 3px"}}>F</span>}
                              <span style={{color:"#4a2a2a"}}>({item.val}%)</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {lista.map((atrib)=>{
                      const p=pById(atrib.pessoaId); if(!p) return null;
                      const isTurno=state.turno.includes(p.id);
                      const contr=p.preferencia!=="indiferente"&&p.preferencia!==parteStr;
                      const outra=parteStr==="primeiras"?segundas:primeiras;
                      const jaTemNoutra=outra.find((a)=>a.pessoaId===p.id&&a.beneficio!=="nenhum");
                      return (
                        <div key={atrib.pessoaId} style={{background:contr?"#1a1200":"#0d0d20",border:`1px solid ${isTurno?"#4a3a7a":"#2a2a4a"}`,borderRadius:7,padding:"7px 10px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                            {isTurno&&<span style={{fontSize:9,background:"#3d2d7a",color:"#c4b5fd",borderRadius:3,padding:"1px 4px",fontWeight:700}}>T</span>}
                            <span style={{color:pc(p),fontSize:12}}>{pi(p)}</span>
                            <span style={{flex:1,fontSize:12,fontWeight:600}}>{p.nome}</span>
                            {contr&&<span style={{fontSize:9,color:"#f59e0b",fontWeight:700}}>≠pref</span>}
                            <button onClick={()=>moverParte(atrib.pessoaId,parteStr)}
                              style={{background:"#2a2a4a",color:"#a78bfa",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                              {parteStr==="primeiras"?"→ Seg":"← Prim"}
                            </button>
                          </div>
                          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                            {["nenhum","bom","mau"].map((b)=>{
                              const isActive=atrib.beneficio===b;
                              const disabled=!!jaTemNoutra&&b!=="nenhum"&&!isActive;
                              return (
                                <button key={b} onClick={()=>!disabled&&setBen(atrib.pessoaId,b,setL)} disabled={disabled}
                                  style={{background:isActive?(b==="bom"?"#166534":b==="mau"?"#991b1b":"#374151"):"#0d0d1a",color:b==="bom"?"#4ade80":b==="mau"?"#f87171":"#9ca3af",border:`1px solid ${b==="bom"?"#16a34a":b==="mau"?"#dc2626":"#374151"}`,borderRadius:4,padding:"2px 8px",cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700,opacity:disabled?0.35:1}}>
                                  {b==="nenhum"?"—":b.toUpperCase()}
                                </button>
                              );
                            })}
                            {contr&&(
                              <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#facc15",cursor:"pointer",background:"#2a2000",border:"1px solid #f59e0b44",borderRadius:4,padding:"2px 6px"}}>
                                <input type="checkbox" checked={atrib.porEscolha||false} onChange={(e)=>setEC(atrib.pessoaId,e.target.checked,setL)} style={{accentColor:"#facc15"}}/>
                                Escolha
                              </label>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            {!canGravar&&<div style={{background:"#2a1a00",border:"1px solid #f59e0b44",borderRadius:6,padding:"8px 12px",fontSize:12,color:"#f59e0b",marginBottom:14}}>
              ⚠️ Primeiras: {primeiras.length}/4 · Segundas: {segundas.length}/4
            </div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setStep(1)} style={BTN("#2a2a4a")}>← Voltar</button>
              <button onClick={()=>canGravar&&onGravar({data,primeiras,segundas})} disabled={!canGravar}
                style={{...BTN(),opacity:canGravar?1:0.4,cursor:canGravar?"pointer":"not-allowed"}}>Gravar Noite</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Tab Histórico — calendar view ───────────────────────────────────────
function TabHistorico({state}){
  const hoje=new Date();
  const [ano,setAno]=useState(hoje.getFullYear());
  const [mes,setMes]=useState(hoje.getMonth()); // 0-based
  const pById=(id)=>state.pessoas.find((p)=>p.id===id);

  // Filter noites for selected month
  const noitesMes=state.noites.filter((n)=>{
    const d=new Date(n.data+"T00:00:00");
    return d.getFullYear()===ano&&d.getMonth()===mes;
  }).sort((a,b)=>new Date(a.data)-new Date(b.data));

  const anos=Array.from({length:10},(_,i)=>hoje.getFullYear()-5+i);

  // Order people for display:
  // Primeiras: Bom, Mau, outros dois
  // Segundas: sem benefício (2), Mau, Bom
  function ordenarPrimeiras(lista){
    const bom=lista.filter((a)=>a.beneficio==="bom");
    const mau=lista.filter((a)=>a.beneficio==="mau");
    const outros=lista.filter((a)=>a.beneficio==="nenhum");
    return [...bom,...mau,...outros];
  }
  function ordenarSegundas(lista){
    const bom=lista.filter((a)=>a.beneficio==="bom");
    const mau=lista.filter((a)=>a.beneficio==="mau");
    const outros=lista.filter((a)=>a.beneficio==="nenhum");
    return [...outros,...mau,...bom];
  }

  // Benefício highlight colours
  function corCelula(atrib,parte){
    if(atrib.beneficio==="nenhum") return {bg:"transparent",color:"#e2e2f0",border:"transparent"};
    if(parte==="primeiras"&&atrib.beneficio==="bom") return {bg:"#e6b80022",color:"#e6b800",border:"#e6b800"};
    if(parte==="primeiras"&&atrib.beneficio==="mau") return {bg:"#e6730022",color:"#e67300",border:"#e67300"};
    if(parte==="segundas"&&atrib.beneficio==="bom")  return {bg:"#1a6fbf22",color:"#4aaeff",border:"#1a6fbf"};
    if(parte==="segundas"&&atrib.beneficio==="mau")  return {bg:"#7b2fbf22",color:"#c084fc",border:"#7b2fbf"};
    return {bg:"transparent",color:"#e2e2f0",border:"transparent"};
  }

  if(noitesMes.length===0){
    return (
      <div>
        <Selectors ano={ano} setAno={setAno} mes={mes} setMes={setMes} anos={anos}/>
        <div style={{color:"#6b6b9a",fontSize:13,marginTop:20}}>Nenhuma noite registada em {MESES[mes]} {ano}.</div>
      </div>
    );
  }

  // Render a table like the photo
  return (
    <div>
      <Selectors ano={ano} setAno={setAno} mes={mes} setMes={setMes} anos={anos}/>

      {/* Legend */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,fontSize:11}}>
        {[["Prim. Bom",BEN_COR.primBom],["Prim. Mau",BEN_COR.primMau],["Seg. Bom",BEN_COR.segBom],["Seg. Mau",BEN_COR.segMau]].map(([l,c])=>(
          <span key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:12,height:12,background:c,borderRadius:2,display:"inline-block"}}/>
            <span style={{color:"#9ca3af"}}>{l}</span>
          </span>
        ))}
      </div>

      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:12,minWidth:"100%"}}>
          <thead>
            <tr style={{background:"#e6b800"}}>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#1a1000",fontWeight:900,letterSpacing:1,whiteSpace:"nowrap",minWidth:80}}>
                NOITES TURNO C — {MESES[mes].toUpperCase()}/{ano}
              </th>
              {noitesMes.map((n)=>{
                const d=new Date(n.data+"T00:00:00");
                const diaSemana=DIAS_PT_FULL[d.getDay()].toUpperCase();
                const dia=d.getDate();
                return (
                  <th key={n.id} style={{padding:"8px 12px",textAlign:"center",color:"#1a1000",fontWeight:900,background:"#e6b800",minWidth:110,borderLeft:"2px solid #fff"}}>
                    <div style={{fontSize:10,letterSpacing:1}}>{diaSemana}</div>
                    <div style={{fontSize:14}}>{dia}</div>
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {/* Primeiras rows */}
            {[0,1,2,3].map((idx)=>(
              <tr key={`p${idx}`} style={{background:idx%2===0?"#1a1a3e":"#141428"}}>
                {idx===0&&(
                  <td rowSpan={4} style={{padding:"10px 14px",fontWeight:900,fontSize:20,color:"#e6b800",textAlign:"center",background:"#1a1a3e",borderRight:"2px solid #e6b80033",verticalAlign:"middle",letterSpacing:2}}>I</td>
                )}
                {noitesMes.map((n)=>{
                  const ordered=ordenarPrimeiras(n.primeiras||[]);
                  const atrib=ordered[idx];
                  if(!atrib) return <td key={n.id} style={{padding:"8px 12px",borderLeft:"1px solid #2a2a4a",minWidth:110}}/>; 
                  const p=pById(atrib.pessoaId);
                  const cor=corCelula(atrib,"primeiras");
                  return (
                    <td key={n.id} style={{padding:"7px 12px",borderLeft:"1px solid #2a2a4a",background:cor.bg,minWidth:110}}>
                      <span style={{color:cor.color,fontWeight:atrib.beneficio!=="nenhum"?700:400,fontSize:12}}>
                        {p?.nome||"—"}
                      </span>
                    </td>
                  );
                })}
              </tr>
            ))}
            {/* Separator */}
            <tr><td colSpan={noitesMes.length+1} style={{height:4,background:"#e6b80033"}}/>
            </tr>
            {/* Segundas rows */}
            {[0,1,2,3].map((idx)=>(
              <tr key={`s${idx}`} style={{background:idx%2===0?"#1a1a3e":"#141428"}}>
                {idx===0&&(
                  <td rowSpan={4} style={{padding:"10px 14px",fontWeight:900,fontSize:20,color:"#4aaeff",textAlign:"center",background:"#1a1a3e",borderRight:"2px solid #4aaeff33",verticalAlign:"middle",letterSpacing:2}}>II</td>
                )}
                {noitesMes.map((n)=>{
                  const ordered=ordenarSegundas(n.segundas||[]);
                  const atrib=ordered[idx];
                  if(!atrib) return <td key={n.id} style={{padding:"8px 12px",borderLeft:"1px solid #2a2a4a",minWidth:110}}/>;
                  const p=pById(atrib.pessoaId);
                  const cor=corCelula(atrib,"segundas");
                  return (
                    <td key={n.id} style={{padding:"7px 12px",borderLeft:"1px solid #2a2a4a",background:cor.bg,minWidth:110}}>
                      <span style={{color:cor.color,fontWeight:atrib.beneficio!=="nenhum"?700:400,fontSize:12}}>
                        {p?.nome||"—"}
                      </span>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Selectors({ano,setAno,mes,setMes,anos}){
  return (
    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
      <div>
        <label style={LBL}>ANO</label>
        <select value={ano} onChange={(e)=>setAno(parseInt(e.target.value))} style={{...INP,width:"auto"}}>
          {anos.map((a)=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>
      <div>
        <label style={LBL}>MÊS</label>
        <select value={mes} onChange={(e)=>setMes(parseInt(e.target.value))} style={{...INP,width:"auto"}}>
          {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(()=>{
    const raw=load();
    if(!raw) return initState();
    if(raw.grupos&&!raw.turno) return {...raw,turno:raw.grupos[0]?.membros||[]};
    return raw;
  });
  const [tab,setTab]=useState("dashboard");
  const [novaPessoa,setNovaPessoa]=useState("");
  const [pessoasSearch,setPessoasSearch]=useState("");
  const [turnoSearch,setTurnoSearch]=useState("");
  const [alertas,setAlertas]=useState([]);
  const [perfilPessoa,setPerfilPessoa]=useState(null);
  const [modalNoite,setModalNoite]=useState(false);
  const [modalExport,setModalExport]=useState(false);
  const importRef=useRef();
  const csvRef=useRef();

  useEffect(()=>{ save(state); },[state]);
  useEffect(()=>{
    setAlertas(state.pessoas.filter((p)=>alertasDuasNoites(p.id,state.noites)).map((p)=>p.nome));
  },[state]);

  const pById=(id)=>state.pessoas.find((p)=>p.id===id);

  const addPessoa=(nome)=>{
    const n=(nome||novaPessoa).trim();
    if(!n||state.pessoas.find((p)=>p.nome.toLowerCase()===n.toLowerCase())) return;
    setState((s)=>({...s,pessoas:[...s.pessoas,{id:Date.now()+""+Math.random(),nome:n,preferencia:"indiferente",historico:{},historicoFora:{}}]}));
    setNovaPessoa("");
  };
  const remPessoa=(id)=>setState((s)=>({...s,pessoas:s.pessoas.filter((p)=>p.id!==id),turno:s.turno.filter((t)=>t!==id)}));
  const updPessoa=(id,d)=>setState((s)=>({...s,pessoas:s.pessoas.map((p)=>p.id===id?{...p,...d}:p)}));

  const importCSV=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const nomes=await parseNomesCSV(file);
      let added=0;
      setState((s)=>{
        const novas=[...s.pessoas];
        nomes.forEach((nome)=>{
          if(!novas.find((p)=>p.nome.toLowerCase()===nome.toLowerCase()))
            novas.push({id:Date.now()+""+Math.random()+added++,nome,preferencia:"indiferente",historico:{},historicoFora:{}});
        });
        return {...s,pessoas:novas};
      });
      alert(`${nomes.length} nomes processados.`);
    }catch(err){ alert("Erro: "+err.message); }
    e.target.value="";
  };

  const addTurno=(nome)=>{
    const p=state.pessoas.find((pp)=>pp.nome===nome); if(!p) return;
    if(state.turno.includes(p.id)) return;
    setState((s)=>({...s,turno:[...s.turno,p.id]}));
    setTurnoSearch("");
  };
  const remTurno=(id)=>setState((s)=>({...s,turno:s.turno.filter((t)=>t!==id)}));

  const gravarNoite=({data,primeiras,segundas})=>{
    setState((s)=>({...s,noites:[...s.noites,{id:Date.now()+"",data,primeiras,segundas}]}));
    setModalNoite(false);
  };
  const remNoite=(id)=>setState((s)=>({...s,noites:s.noites.filter((n)=>n.id!==id)}));

  const importJSON=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ try{ const d=JSON.parse(ev.target.result); if(d.pessoas&&d.noites){setState(d);alert("Importado!");}else alert("Ficheiro inválido."); }catch{alert("Erro ao importar.");} };
    reader.readAsText(file); e.target.value="";
  };

  const TABS=[
    {id:"dashboard",label:"Dashboard"},{id:"pessoas",label:"Pessoas"},
    {id:"turno",label:"Turno"},{id:"noites",label:"Noites"},
    {id:"estatisticas",label:"Estatísticas"},{id:"historico",label:"Histórico"},
  ];

  // Stats for display
  const getStatsDisplay=(p)=>calcStats(p,state.noites,state.turno);

  return (
    <div style={{fontFamily:"'Courier New',monospace",minHeight:"100vh",background:"#0d0d1a",color:"#e2e2f0"}}>
      <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
      <input ref={csvRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={importCSV}/>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1a3e,#0d0d1a)",borderBottom:"2px solid #3d3d7a",padding:"16px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,letterSpacing:3,color:"#a78bfa"}}>🌙 GESTÃO DE TURNOS NOTURNOS</div>
          <div style={{fontSize:10,color:"#6b6b9a",letterSpacing:2}}>BENEFÍCIOS · PRIMEIRAS · SEGUNDAS</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setModalExport(true)} style={{...BTN("#1a3a1a"),border:"1px solid #2d5a2d",fontSize:11}}>⬇ Exportar</button>
          <button onClick={()=>importRef.current.click()} style={{...BTN("#1a1a3a"),border:"1px solid #3d3d7a",fontSize:11}}>⬆ Importar</button>
        </div>
      </div>

      {alertas.length>0&&(
        <div style={{background:"#3d1a00",border:"1px solid #ff6600",margin:"12px 28px 0",borderRadius:8,padding:"10px 16px",fontSize:13}}>
          <span style={{color:"#ff9900",fontWeight:700}}>⚠️ ALERTA: </span>
          <span style={{color:"#ffcc88"}}>{alertas.join(", ")} {alertas.length===1?"está":"estão"} a fazer duas noites seguidas com benefício!</span>
        </div>
      )}

      <div style={{display:"flex",gap:2,padding:"12px 28px 0",borderBottom:"1px solid #2a2a4a",flexWrap:"wrap"}}>
        {TABS.map((t)=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{background:tab===t.id?"#3d3d7a":"transparent",color:tab===t.id?"#a78bfa":"#6b6b9a",border:"none",borderRadius:"6px 6px 0 0",padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700,letterSpacing:1,fontFamily:"inherit"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"22px 28px"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:22}}>
              {[{l:"Pessoas",v:state.pessoas.length,i:"👥"},{l:"No Turno",v:state.turno.length,i:"🏷️"},{l:"Noites",v:state.noites.length,i:"🌙"},{l:"Alertas",v:alertas.length,i:"⚠️",red:alertas.length>0}].map((c)=>(
                <div key={c.l} style={{background:c.red?"#3d1a00":"#1a1a3e",border:`1px solid ${c.red?"#ff6600":"#3d3d7a"}`,borderRadius:10,padding:16}}>
                  <div style={{fontSize:24}}>{c.i}</div>
                  <div style={{fontSize:28,fontWeight:900,color:c.red?"#ff9900":"#a78bfa"}}>{c.v}</div>
                  <div style={{fontSize:11,color:"#6b6b9a"}}>{c.l}</div>
                </div>
              ))}
            </div>
            {state.turno.length>0&&<div style={{background:"#0d1f0d",border:"1px solid #2d5a2d",borderRadius:8,padding:"8px 14px",marginBottom:14,fontSize:12,color:"#88cc88"}}>
              🟢 Turno: {state.turno.map((id)=>pById(id)?.nome).filter(Boolean).join(", ")}
            </div>}
            <button onClick={()=>setModalNoite(true)} style={{...BTN(),fontSize:14,padding:"14px 32px",letterSpacing:2}}>+ REGISTAR NOVA NOITE</button>
          </div>
        )}

        {/* PESSOAS */}
        {tab==="pessoas"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <input value={novaPessoa} onChange={(e)=>setNovaPessoa(e.target.value)}
                onKeyDown={(e)=>e.key==="Enter"&&addPessoa()}
                placeholder="Nome da pessoa..." style={{...INP,flex:1,minWidth:180}}/>
              <button onClick={()=>addPessoa()} style={BTN()}>Adicionar</button>
              <button onClick={()=>csvRef.current.click()} style={{...BTN("#1a3a2a"),border:"1px solid #2d5a2d",fontSize:11}}>📂 Importar CSV</button>
            </div>
            <div style={{fontSize:11,color:"#6b6b9a",marginBottom:12}}>CSV: .csv ou .txt com nomes por linha ou separados por vírgula.</div>
            <input value={pessoasSearch} onChange={(e)=>setPessoasSearch(e.target.value)}
              placeholder="🔍 Pesquisar pessoa..." style={{...INP,marginBottom:14}}/>
            {state.pessoas.length===0&&<div style={{color:"#6b6b9a"}}>Nenhuma pessoa adicionada.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...state.pessoas]
                .filter((p)=>p.nome.toLowerCase().includes(pessoasSearch.toLowerCase()))
                .sort((a,b)=>a.nome.localeCompare(b.nome))
                .map((p)=>{
                const al=alertasDuasNoites(p.id,state.noites);
                const s=getStatsDisplay(p);
                const noTurno=state.turno.includes(p.id);
                return (
                  <div key={p.id} style={{background:al?"#2a1000":"#1a1a3e",border:`1px solid ${al?"#ff6600":noTurno?"#4a3a7a":"#3d3d7a"}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    {noTurno&&<span style={{fontSize:9,background:"#3d2d7a",color:"#c4b5fd",borderRadius:3,padding:"1px 5px",fontWeight:700}}>TURNO</span>}
                    <span style={{color:pc(p),fontSize:14}}>{pi(p)}</span>
                    <span style={{fontWeight:700,fontSize:14,flex:1}}>{al&&"⚠️ "}{p.nome}</span>
                    {p.preferencia!=="indiferente"&&(
                      <span style={{fontSize:11,color:"#ffaa44"}}>
                        T:{s.turno.pctContraria}% | F:{s.fora.pctContraria}%
                      </span>
                    )}
                    <button onClick={()=>setPerfilPessoa(p)} style={{...BTN("#2a2a5a"),fontSize:11,padding:"4px 12px"}}>✏️ Perfil</button>
                    <button onClick={()=>remPessoa(p.id)} style={{background:"#3d1a1a",color:"#ff6b6b",border:"none",borderRadius:4,padding:"4px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>Remover</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TURNO */}
        {tab==="turno"&&(
          <div>
            <div style={{background:"#0d1020",border:"1px solid #3d3d7a",borderRadius:10,padding:20}}>
              <div style={{fontWeight:900,fontSize:14,color:"#a78bfa",marginBottom:6,letterSpacing:1}}>GRUPO DE TURNO</div>
              <div style={{fontSize:12,color:"#6b6b9a",marginBottom:16}}>Pessoas do turno têm SEMPRE prioridade na distribuição e nos benefícios.</div>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <Autocomplete value={turnoSearch} onChange={setTurnoSearch}
                  options={state.pessoas.filter((p)=>!state.turno.includes(p.id)).map((p)=>p.nome)}
                  onSelect={(nome)=>addTurno(nome)} placeholder="Escreva um nome para adicionar ao turno..."/>
                <button onClick={()=>addTurno(turnoSearch)} style={{...BTN(),whiteSpace:"nowrap"}}>Adicionar</button>
              </div>
              <div style={{fontSize:11,color:"#6b6b9a",marginBottom:10}}>MEMBROS ({state.turno.length}):</div>
              {state.turno.length===0&&<div style={{color:"#4b5563",fontSize:13}}>Nenhum membro no turno.</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {state.turno.map((id)=>{
                  const p=pById(id); if(!p) return null;
                  return (
                    <div key={id} style={{background:"#2a1a5a",border:"1px solid #a78bfa",borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{color:pc(p)}}>{pi(p)}</span>
                      <span style={{fontWeight:700,fontSize:13}}>{p.nome}</span>
                      <button onClick={()=>remTurno(id)} style={{background:"transparent",color:"#f87171",border:"none",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* NOITES */}
        {tab==="noites"&&(
          <div>
            <button onClick={()=>setModalNoite(true)} style={{...BTN(),marginBottom:20}}>+ Nova Noite</button>
            {state.noites.length===0&&<div style={{color:"#6b6b9a"}}>Nenhuma noite registada.</div>}
            {[...state.noites].sort((a,b)=>new Date(b.data)-new Date(a.data)).map((n)=>(
              <div key={n.id} style={CARD}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontWeight:900,color:"#a78bfa"}}>🌙 {n.data}</span>
                  <button onClick={()=>remNoite(n.id)} style={{background:"#3d1a1a",color:"#ff6b6b",border:"none",borderRadius:4,padding:"4px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>Remover</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {["primeiras","segundas"].map((parte)=>(
                    <div key={parte}>
                      <div style={{fontSize:11,color:"#6b6b9a",marginBottom:6}}>{parte==="primeiras"?"🌑 PRIMEIRAS":"🌒 SEGUNDAS"}:</div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        {(n[parte]||[]).map((a)=>{
                          const pp=pById(a.pessoaId); if(!pp) return null;
                          const corM={bom:"#16a34a",mau:"#dc2626",nenhum:"#4b5563"};
                          return (
                            <div key={a.pessoaId} style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
                              {a.eraTurno&&<span style={{fontSize:8,background:"#3d2d7a",color:"#c4b5fd",borderRadius:2,padding:"1px 4px",fontWeight:700}}>T</span>}
                              <span style={{color:pc(pp)}}>{pi(pp)}</span>
                              <span style={{flex:1}}>{pp.nome}</span>
                              {a.beneficio!=="nenhum"&&<span style={{background:corM[a.beneficio],color:"#fff",borderRadius:3,padding:"1px 6px",fontSize:10,fontWeight:700}}>{a.beneficio.toUpperCase()}</span>}
                              {a.porEscolha&&<span style={{color:"#facc15",fontSize:10}}>★EC</span>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ESTATÍSTICAS */}
        {tab==="estatisticas"&&(
          <div>
            {state.pessoas.length===0&&<div style={{color:"#6b6b9a"}}>Sem pessoas.</div>}
            {/* Turno stats */}
            {["turno","fora"].map((grupo)=>(
              <div key={grupo} style={{marginBottom:28}}>
                <div style={{fontWeight:700,color:"#a78bfa",marginBottom:10,letterSpacing:1,fontSize:13}}>
                  {grupo==="turno"?"🏷️ COMO MEMBRO DO TURNO":"👤 FORA DO TURNO"}
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #3d3d7a"}}>
                        {["Pessoa","Pref.","Prim.","Seg.","P.Bom%","P.Mau%","S.Bom%","S.Mau%","% Contrária"].map((h,i)=>(
                          <th key={i} style={{padding:"7px 10px",textAlign:"left",color:"#6b6b9a",letterSpacing:1,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {state.pessoas.map((p)=>{
                        const s=getStatsDisplay(p)[grupo];
                        const al=alertasDuasNoites(p.id,state.noites);
                        const noTurno=state.turno.includes(p.id);
                        return (
                          <tr key={p.id} style={{borderBottom:"1px solid #2a2a4a",background:al?"#2a1000":"transparent"}}>
                            <td style={{padding:"7px 10px",fontWeight:700,color:al?"#ff9900":"#e2e2f0",whiteSpace:"nowrap"}}>
                              {noTurno&&<span style={{fontSize:8,background:"#3d2d7a",color:"#c4b5fd",borderRadius:2,padding:"1px 4px",fontWeight:700,marginRight:4}}>T</span>}
                              {al&&"⚠️ "}{p.nome}
                            </td>
                            <td style={{padding:"7px 10px",color:pc(p)}}>{pi(p)}</td>
                            <td style={{padding:"7px 10px",color:"#a78bfa"}}>{s.nPrimeiras}</td>
                            <td style={{padding:"7px 10px",color:"#a78bfa"}}>{s.nSegundas}</td>
                            <td style={{padding:"7px 10px",color:"#e6b800"}}>{s.pctPrimBom}%</td>
                            <td style={{padding:"7px 10px",color:"#e67300"}}>{s.pctPrimMau}%</td>
                            <td style={{padding:"7px 10px",color:"#4aaeff"}}>{s.pctSegBom}%</td>
                            <td style={{padding:"7px 10px",color:"#c084fc"}}>{s.pctSegMau}%</td>
                            <td style={{padding:"7px 10px",color:p.preferencia!=="indiferente"?"#ffaa44":"#4b5563"}}>
                              {p.preferencia!=="indiferente"?`${s.pctContraria}% (${s.contrariaCount}/${s.totalPref})`:"—"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* HISTÓRICO */}
        {tab==="historico"&&<TabHistorico state={state}/>}
      </div>

      {modalNoite&&<ModalNoite state={state} onClose={()=>setModalNoite(false)} onGravar={gravarNoite}/>}
      {modalExport&&<ModalExport state={state} onClose={()=>setModalExport(false)}/>}
      {perfilPessoa&&(
        <ModalPerfil pessoa={perfilPessoa} noites={state.noites} turno={state.turno} onClose={()=>setPerfilPessoa(null)}
          onSave={(d)=>{ updPessoa(perfilPessoa.id,d); setPerfilPessoa(null); }}/>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
